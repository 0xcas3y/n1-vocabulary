<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オノマトペカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f12;
  --surface: #1a1a20;
  --surface2: #22222a;
  --border: #2e2e38;
  --accent: #e8522a;
  --accent-dim: rgba(232,82,42,0.15);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #f0ede8;
  --text2: #c8c8d8;
  --text3: #888898;
  --green: #4caf7d;
  --blue: #5b8dee;
  --red: #e05555;
  --nav-h: 52px;
  --bot-h: 62px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px;
  gap: 12px;
}
.nav-logo {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900; font-size: 13px;
  color: var(--text); letter-spacing: 0.08em;
  flex: 1;
}
.nav-logo span { color: var(--accent); }
.nav-settings-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ── MAIN ── */
.main {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  bottom: var(--bot-h);
  overflow: hidden;
}
.screen {
  position: absolute; inset: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--bg);
}
.screen.hidden { display: none; }

/* ── STUDY SCREEN ── */
#study-screen {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 14px 14px 8px;
}

/* Progress */
.prog-wrap {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.prog-bar-bg {
  flex: 1; height: 2px;
  background: var(--border); border-radius: 1px; overflow: hidden;
}
.prog-bar-fill {
  height: 100%; background: var(--accent); border-radius: 1px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}
.prog-text {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; color: var(--text3);
  min-width: 40px; text-align: right;
}

/* Card */
.card-container {
  width: 100%; max-width: 480px;
  position: relative; touch-action: pan-y;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0;
  overflow: hidden;
  position: relative;
}

.card-stripe {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--gold));
}

.card-body {
  padding: 16px 18px 18px;
}

.card-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.card-part-tag {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 3px 8px; border-radius: 4px;
}
.card-num {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; color: var(--text3);
}

.card-main {
  margin-bottom: 14px;
}

.card-word {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 36px; font-weight: 900; line-height: 1.1;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 3px;
}
.card-reading {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; color: var(--text3);
  letter-spacing: 0.05em; margin-bottom: 10px;
}
.card-tts-row {
  display: flex; gap: 6px;
}
.tts-btn {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  font-size: 10px; color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap; transition: all 0.15s;
}
.tts-btn:active { background: var(--border); color: var(--text); }

.card-divider {
  height: 1px; background: var(--border); margin-bottom: 12px;
}

.card-meaning {
  font-size: 17px; font-weight: 600;
  color: var(--text); margin-bottom: 8px; line-height: 1.5;
}

.card-explanation {
  font-size: 12px; color: var(--text);
  line-height: 1.8; margin-bottom: 12px;
}

.card-example {
  background: var(--surface2);
  border-left: 2px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
}
.card-example .jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; color: var(--text);
  line-height: 1.7; margin-bottom: 3px;
}
.card-example .zh {
  font-size: 11px; color: var(--text2); line-height: 1.5;
}

/* Score row */
.score-row {
  display: flex; gap: 7px;
  width: 100%; max-width: 480px;
  margin-top: 10px;
}
.score-btn {
  flex: 1; padding: 10px 4px;
  border-radius: 12px; border: 1px solid transparent;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: transform 0.12s, border-color 0.12s;
  font-weight: 700;
}
.score-btn:active { transform: scale(0.93); }
.score-btn .sn { font-size: 18px; line-height: 1; }
.score-btn .sl { font-size: 9px; opacity: 1; }

.score-btn[data-score="0"] { background: #1e1e24; color: #888898; border-color: var(--border); }
.score-btn[data-score="1"] { background: #0d1f35; color: var(--blue); border-color: #1e3a5f; }
.score-btn[data-score="2"] { background: #1a1800; color: var(--gold); border-color: #3a3200; }
.score-btn[data-score="3"] { background: #200e0e; color: var(--red); border-color: #3d1a1a; }
.score-btn.active {
  transform: scale(1.06);
  box-shadow: 0 0 0 2px currentColor;
}

.hint-text {
  font-size: 10px; color: var(--text3);
  text-align: center; margin-top: 6px;
  width: 100%; max-width: 480px;
}

/* card animation */
.card-enter { animation: cardIn 0.28s cubic-bezier(.34,1.4,.64,1); }
@keyframes cardIn {
  from { transform: scale(0.93) translateY(16px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* ── SETTINGS PANEL (slide up) ── */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 300; display: flex; align-items: flex-end;
}
.settings-overlay.hidden { display: none; }
.settings-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%; padding: 28px 22px 40px;
  animation: slideUp 0.28s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.settings-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 24px; letter-spacing: 0.06em;
}
.settings-row {
  margin-bottom: 24px;
}
.settings-label {
  font-size: 11px; color: var(--text3);
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em; margin-bottom: 12px;
  text-transform: uppercase;
}
.daily-picker {
  display: flex; align-items: center; gap: 14px;
}
.daily-num {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 52px; font-weight: 900;
  color: var(--accent); min-width: 72px; text-align: center;
  line-height: 1;
}
.daily-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; background: var(--border); border-radius: 2px;
  outline: none; accent-color: var(--accent);
}
.daily-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 2px 8px rgba(232,82,42,0.4);
}
.settings-info {
  font-size: 12px; color: var(--text3); margin-top: 8px;
  line-height: 1.6;
}
.settings-close-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.06em;
}
.settings-close-btn:active { opacity: 0.85; }
.reset-link {
  display: block; text-align: center; margin-top: 14px;
  font-size: 12px; color: var(--text3); cursor: pointer;
  padding: 6px;
}
.reset-link:active { color: var(--red); }

/* ── PLAN SCREEN ── */
#plan-screen {
  padding: 20px 16px 20px;
}
.screen-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 18px;
}
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
}
.stat-card .sv {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 30px; font-weight: 900; color: var(--text);
  line-height: 1;
}
.stat-card .sv.accent { color: var(--accent); }
.stat-card .sl {
  font-size: 10px; color: var(--text3);
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em; margin-top: 4px;
}
.section-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 18px;
  margin-bottom: 14px;
}
.section-block-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px;
}
.score-dist {
  display: flex; gap: 8px;
}
.score-dist-item {
  flex: 1; text-align: center; border-radius: 10px; padding: 10px 4px;
}
.score-dist-item .dc { font-size: 22px; font-weight: 900; line-height: 1; }
.score-dist-item .dl { font-size: 9px; margin-top: 4px; color: var(--text3); }

.part-list { display: flex; flex-direction: column; gap: 10px; }
.part-item { display: flex; align-items: center; gap: 10px; }
.part-name { font-size: 12px; color: var(--text); flex: 1.2; }
.part-bar-bg { flex: 2; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.part-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }
.part-pct { font-size: 11px; color: var(--text3); min-width: 30px; text-align: right;
  font-family: 'Noto Sans JP', sans-serif; }

/* ── BROWSE SCREEN ── */
#browse-screen { padding: 16px; }
.browse-filters {
  display: flex; gap: 7px; margin-bottom: 14px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.browse-filters::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 11px; cursor: pointer; font-family: inherit;
  color: var(--text2); white-space: nowrap; transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

.word-list { display: flex; flex-direction: column; gap: 7px; }
.word-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color 0.15s;
}
.word-item:active { border-color: var(--accent); }
.word-item .wi { 
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 19px; font-weight: 700;
  color: var(--text); min-width: 72px;
}
.word-item .winfo { flex: 1; }
.word-item .wm { font-size: 12px; color: var(--text); }
.word-item .wr { font-size: 10px; color: var(--text2); margin-top: 2px; }
.word-badge {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
  font-family: 'Noto Sans JP', sans-serif;
}
.badge-new { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.badge-0 { background: #2a2a30; color: var(--text3); }
.badge-1 { background: #0d1f35; color: var(--blue); }
.badge-2 { background: #1a1800; color: var(--gold); }
.badge-3 { background: #200e0e; color: var(--red); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 200; display: flex; align-items: flex-end;
}
.modal-overlay.hidden { display: none; }
.modal-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%; padding: 24px 20px 40px;
  max-height: 82vh; overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s cubic-bezier(.34,1.2,.64,1);
}
.modal-close {
  position: absolute; top: 18px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 14px; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}
.modal-word {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 40px; font-weight: 900; color: var(--text);
  margin-bottom: 4px;
}
.modal-reading { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.modal-meaning { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.modal-exp { font-size: 13px; color: var(--text); line-height: 1.8; margin-bottom: 12px; }
.modal-ex {
  background: var(--surface2);
  border-left: 2px solid var(--gold);
  padding: 10px 12px; border-radius: 0 8px 8px 0; margin-bottom: 16px;
}
.modal-ex .jp { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--text); margin-bottom: 4px; }
.modal-ex .zh { font-size: 11px; color: var(--text3); }
.modal-score-row { display: flex; gap: 7px; margin-top: 4px; }
.modal-score-btn {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid transparent;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.modal-score-btn[data-score="0"] { background: #1e1e24; color: var(--text3); border-color: var(--border); }
.modal-score-btn[data-score="1"] { background: #0d1f35; color: var(--blue); border-color: #1e3a5f; }
.modal-score-btn[data-score="2"] { background: #1a1800; color: var(--gold); border-color: #3a3200; }
.modal-score-btn[data-score="3"] { background: #200e0e; color: var(--red); border-color: #3d1a1a; }
.modal-score-btn.active { box-shadow: 0 0 0 2px currentColor; }
.modal-score-label { font-size: 9px; opacity: 0.7; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bot-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; border: none; background: none;
  cursor: pointer; font-family: inherit;
  color: var(--text3); font-size: 9px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.06em;
  transition: color 0.15s;
}
.bnav-btn .bicon { font-size: 20px; }
.bnav-btn.active { color: var(--accent); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 20px;
  font-size: 12px; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
  font-family: 'Noto Sans JP', sans-serif;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DONE STATE ── */
#done-overlay {
  padding: 32px 20px;
  text-align: center;
}
.done-emoji { font-size: 56px; margin-bottom: 14px; display: block; }
.done-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 20px; font-weight: 900; color: var(--text);
  margin-bottom: 6px;
}
.done-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
.done-stats {
  display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 16px;
}
.done-stat {
  border-radius: 12px; padding: 10px 14px; text-align: center;
  border: 1px solid var(--border); min-width: 64px;
}
.done-stat .dv { font-size: 24px; font-weight: 900; line-height: 1; }
.done-stat .dl { font-size: 9px; color: var(--text3); margin-top: 3px; }
.done-note { font-size: 11px; color: var(--text3); }
.done-note-sub { font-size: 12px; color: var(--gold); margin-bottom: 4px; }
.more-btn {
  width: 100%; padding: 13px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  color: var(--accent);
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
  transition: background 0.15s;
}
.more-btn:active { background: var(--accent-dim); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">オノマトペ<span>カード</span></div>
  <a class="nav-switch" href="n1.html">← N1語彙</a>
  <div class="nav-settings-btn" id="settingsBtn">⚙</div>
</nav>

<!-- SETTINGS PANEL -->
<div class="settings-overlay hidden" id="settings-overlay">
  <div class="settings-sheet">
    <div class="settings-title">学習設定</div>
    <div class="settings-row">
      <div class="settings-label">每日新词数量</div>
      <div class="daily-picker">
        <div class="daily-num" id="daily-val">10</div>
        <input type="range" class="daily-slider" id="daily-slider" min="3" max="50" value="10">
      </div>
      <div class="settings-info" id="settings-info">每天学 10 个新词，约需 22 天学完全部词汇</div>
    </div>
    <button class="settings-close-btn" id="settings-close">确认</button>
    <span class="reset-link" id="reset-btn">重置所有进度</span>
  </div>
</div>

<div class="main">

  <!-- STUDY SCREEN -->
  <div class="screen" id="study-screen">
    <div class="prog-wrap">
      <div class="prog-bar-bg">
        <div class="prog-bar-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="prog-text" id="prog-num">0 / 0</div>
    </div>

    <div class="card-container" id="card-container">
      <div class="card card-enter" id="the-card">
        <div class="card-stripe"></div>
        <div class="card-body">
          <div class="card-meta">
            <div class="card-part-tag" id="card-part">—</div>
            <div class="card-num" id="card-num"></div>
          </div>
          <div class="card-main">
            <div class="card-main-left">
              <div class="card-word" id="card-word"></div>
              <div class="card-reading" id="card-reading"></div>
              <div class="card-tts-row">
                <button class="tts-btn" id="tts-word">♪ 词汇</button>
                <button class="tts-btn" id="tts-example">♪ 例句</button>
              </div>
            </div>
          </div>
          <div class="card-divider"></div>
          <div class="card-meaning" id="card-meaning"></div>
          <div class="card-explanation" id="card-explanation"></div>
          <div class="card-example">
            <div class="jp" id="card-ex-jp"></div>
            <div class="card-ex-zh" id="card-ex-zh"></div>
            <div class="card-note" id="card-note" style="display:none"><div class="card-note-label">💡 使い分けポイント</div><div id="card-note-text"></div></div>
            <div class="zh" id="card-ex-zh"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="score-row" id="score-row">
      <button class="score-btn" data-score="0">
        <span class="sn">—</span><span class="sl">跳过</span>

  {id:51,word:"てくてく",reading:"てくてく",meaning:"（徒步）一步一步地走",example_jp:"駅までてくてくと歩いた",example_zh:"一步一步地走到了车站。",note:"地道に歩いている様子。疲れた感じはなく、黙々と歩くイメージ。"},
  {id:52,word:"とぼとぼ",reading:"とぼとぼ",meaning:"无精打采地走，垂头丧气地走",example_jp:"失敗してとぼとぼと帰った",example_zh:"失败后垂头丧气地回了家。",note:"元気なく力なく歩く様子。気落ちしていたり疲れていたりするときに使う。"},
  {id:53,word:"すたすた",reading:"すたすた",meaning:"大步流星，快步走",example_jp:"怒ってすたすたと立ち去った",example_zh:"生气地大步走开了。",note:"速く迷いなく歩く様子。目的地に向かって自信満々に歩くイメージ。"},
  {id:54,word:"のそのそ",reading:"のそのそ",meaning:"慢吞吞地爬行",example_jp:"クマがのそのそと歩いていた",example_zh:"熊慢吞吞地走着。",note:"大きくて重いものが緩慢に動く様子。「のろのろ」は速度、「のそのそ」は体の重さを感じる動き。"},
  {id:55,word:"いそいそ",reading:"いそいそ",meaning:"喜滋滋地，兴冲冲地",example_jp:"デートに向けていそいそと準備した",example_zh:"为约会兴冲冲地准备着。",note:"嬉しくて心が弾んで動く様子。良いことへの期待感がある。「そわそわ」は不安混じりだが「いそいそ」は純粋な喜び。"},
  {id:56,word:"せかせか",reading:"せかせか",meaning:"急急忙忙，焦躁地",example_jp:"せかせかと動き回っている",example_zh:"急急忙忙地来回走动。",note:"余裕なく焦って動く様子。「てきぱき」は効率的だが「せかせか」は落ち着きがない。"},
  {id:57,word:"あたふた",reading:"あたふた",meaning:"慌慌张张，手足无措",example_jp:"突然のことにあたふたしてしまった",example_zh:"发生了突然的事，手忙脚乱。",note:"「わたわた」とほぼ同じ。突発的な事態に対処しきれず動揺する様子。"},
  {id:58,word:"わたわた",reading:"わたわた",meaning:"慌慌张张，不知所措",example_jp:"急に呼ばれてわたわたした",example_zh:"突然被叫，慌乱起来。",note:"「あたふた」と類似。どちらも慌てる様子だが「わたわた」の方がやや大げさな感じ。"},
  {id:59,word:"ぐっすり",reading:"ぐっすり",meaning:"酣睡，睡得很沉",example_jp:"昨夜はぐっすり眠れた",example_zh:"昨晚睡得很沉。",note:"深い睡眠の状態。熟睡しているときに使う。「すやすや」は静かな睡眠、「ぐっすり」は深い睡眠。"},
  {id:60,word:"すやすや",reading:"すやすや",meaning:"（小孩）安静地熟睡",example_jp:"赤ちゃんがすやすやと眠っている",example_zh:"宝宝安静地熟睡着。",note:"主に赤ちゃんや子供の静かで穏やかな睡眠に使う。大人にも使えるが子供のイメージが強い。"},
  {id:61,word:"うとうと",reading:"うとうと",meaning:"迷迷糊糊地打盹",example_jp:"電車でうとうとしてしまった",example_zh:"在电车上迷迷糊糊地打盹了。",note:"完全に眠ってはいないが意識がもうろうとしている状態。「ぐっすり」の前段階。"},
  {id:62,word:"うつらうつら",reading:"うつらうつら",meaning:"半睡半醒，昏昏欲睡",example_jp:"会議中うつらうつらしてしまった",example_zh:"开会时昏昏欲睡。",note:"「うとうと」より眠りと覚醒を繰り返している感じが強い。"},
  {id:63,word:"ぐうぐう",reading:"ぐうぐう",meaning:"鼾声如雷；（肚子）咕咕叫",example_jp:"疲れてぐうぐう眠った",example_zh:"累得鼾声大作地睡着了。",note:"いびきをかきながら熟睡する音。お腹がぐうぐう鳴る（空腹）にも使う。"},
  {id:64,word:"すうすう",reading:"すうすう",meaning:"呼呼（睡觉的呼吸声）；凉丝丝",example_jp:"赤ちゃんがすうすう眠っている",example_zh:"宝宝呼呼地睡着了。",note:"穏やかな寝息の音。すき間風が入る感じにも使う（隙間からすうすう入ってくる）。"},
  {id:65,word:"ぐったり",reading:"ぐったり",meaning:"精疲力竭，筋疲力尽",example_jp:"疲れてぐったりしている",example_zh:"累得精疲力竭。",note:"体に力が入らないほど疲れた状態。「くたくた」「へとへと」と似ているが程度感が異なる。"},
  {id:66,word:"くたくた",reading:"くたくた",meaning:"累得不行，精疲力尽",example_jp:"一日中働いてくたくただ",example_zh:"工作了一整天，累得不行。",note:"「ぐったり」と似るが、「くたくた」はより使い古された・へたれた感じ。"},
  {id:67,word:"へとへと",reading:"へとへと",meaning:"累得完全不行",example_jp:"マラソンでへとへとになった",example_zh:"跑马拉松累得完全不行了。",note:"三つの中で最も疲弊した感じ。体だけでなく精神的な疲れにも使う。"},
  {id:68,word:"ずきずき",reading:"ずきずき",meaning:"一阵阵地抽痛（牙痛/头痛）",example_jp:"歯がずきずきと痛む",example_zh:"牙齿一阵阵地抽痛。",note:"脈打つような周期的な痛みに使う。「きりきり」は締め付けられる痛み。"},
  {id:69,word:"ちくちく",reading:"ちくちく",meaning:"刺痛，针扎般的痛；话语刺人",example_jp:"のどがちくちく痛い",example_zh:"喉咙刺刺地痛。",note:"細くて鋭い刺激。「ずきずき」は脈打つ痛み、「ちくちく」は針で刺されるような細い痛み。"},
  {id:70,word:"じんじん",reading:"じんじん",meaning:"（手脚）发麻，针扎感",example_jp:"手がじんじんしびれている",example_zh:"手麻麻的，有刺痛感。",note:"しびれた時の感覚。「ずきずき」は痛み、「じんじん」はしびれ・麻痺感。"},
  {id:71,word:"きりきり",reading:"きりきり",meaning:"（胃）绞痛；极度紧迫",example_jp:"胃がきりきりと痛む",example_zh:"胃部绞痛。",note:"締め付けられるような痛みや、追い詰められた状態に使う。"},
  {id:72,word:"がんがん",reading:"がんがん",meaning:"头痛欲裂；咣咣作响",example_jp:"頭ががんがんする",example_zh:"头痛欲裂。",note:"頭に響くような強い痛みや騒音に使う。「ずきずき」より激しい痛みのイメージ。"},
  {id:73,word:"ひりひり",reading:"ひりひり",meaning:"火辣辣地痛，灼痛",example_jp:"日焼けで肌がひりひりする",example_zh:"晒伤后皮肤火辣辣地痛。",note:"皮膚の表面が熱く焼けるような痛み。傷口や日焼けに使う。"},
  {id:74,word:"むずむず",reading:"むずむず",meaning:"痒痒的；跃跃欲试",example_jp:"鼻がむずむずしてくしゃみが出た",example_zh:"鼻子痒痒的，打了个喷嚏。",note:"表面がかゆくて落ち着かない感覚。「やりたくてしょうがない」という気持ちにも使う（うずうずと類似）。"},
  {id:75,word:"うずうず",reading:"うずうず",meaning:"跃跃欲试，按捺不住",example_jp:"早くやりたくてうずうずしている",example_zh:"急切地想做，按捺不住。",note:"「むずむず」と違い、体の感覚より心理的な落ち着かなさに使うことが多い。"},
  {id:76,word:"ほかほか",reading:"ほかほか",meaning:"暖烘烘，热乎乎（食物）",example_jp:"炊き立てのご飯がほかほかだ",example_zh:"刚煮好的米饭热乎乎的。",note:"主に食べ物や体が適度に温かい様子。「ぽかぽか」は外部の暖かさ、「ほかほか」は内側から。"},
  {id:77,word:"ぽかぽか",reading:"ぽかぽか",meaning:"暖洋洋（阳光/心情）；啪啪打人",example_jp:"春の日差しがぽかぽかと暖かい",example_zh:"春天的阳光暖洋洋的。",note:"日差しや温かい気持ちに使う。殴る意味（ぽかぽか殴る）もあるので文脈注意。"},
  {id:78,word:"ひんやり",reading:"ひんやり",meaning:"凉丝丝，清凉（舒适感）",example_jp:"川の水がひんやりして気持ちいい",example_zh:"河水凉丝丝的，很舒服。",note:"不快ではない適度な冷たさ。「ひえひえ」より温度が高く心地よい。"},
  {id:79,word:"ひえひえ",reading:"ひえひえ",meaning:"冰凉，寒气逼人",example_jp:"冷蔵庫からひえひえの飲み物を出した",example_zh:"从冰箱里拿出了冰凉的饮料。",note:"「ひんやり」より温度が低い。冷蔵庫や冬の空気など。"},
  {id:80,word:"じとじと",reading:"じとじと",meaning:"湿漉漉，黏腻（梅雨）",example_jp:"梅雨でじとじとした季節が続く",example_zh:"梅雨季节，湿漉漉的日子持续着。",note:"不快な湿気の感覚。「むしむし」は暑さと湿気の組み合わせ、「じとじと」は湿気の不快感。"},
  {id:81,word:"むしむし",reading:"むしむし",meaning:"闷热潮湿",example_jp:"今日はむしむしして不快だ",example_zh:"今天闷热潮湿，很不舒服。",note:"暑くて湿気が多い不快な状態。「じとじと」は湿気のみ、「むしむし」は蒸し暑さ全体。"},
  {id:82,word:"ぼんやり",reading:"ぼんやり",meaning:"迷迷糊糊，发呆；模糊",example_jp:"ぼんやりと窓の外を見ていた",example_zh:"迷迷糊糊地看着窗外。",note:"意識がはっきりしない様子と、輪郭がぼやけている様子の両方がある。"},
  {id:83,word:"ぼーっと",reading:"ぼーっと",meaning:"发呆，出神（完全走神）",example_jp:"授業中ぼーっとしていた",example_zh:"上课时完全发呆走神了。",note:"「ぼんやり」より意識が遠い感じ。完全に別のことを考えている状態。"},
  {id:84,word:"すっきり",reading:"すっきり",meaning:"清爽，神清气爽；整洁",example_jp:"悩みを話してすっきりした",example_zh:"说出了烦恼，心里清爽多了。",note:"気持ちや場所がすっきりした状態。「さっぱり」と近いが「すっきり」の方がスマートな印象。"},
  {id:85,word:"さっぱり",reading:"さっぱり",meaning:"清爽（洗完澡等）；（否定）完全不",example_jp:"シャワーを浴びてさっぱりした",example_zh:"洗了个澡，清爽多了。",note:"「すっきり」と近いが、「さっぱりわからない（全然わからない）」という否定表現でも使う。"},
  {id:86,word:"ばっちり",reading:"ばっちり",meaning:"完美，万无一失，完全准备好",example_jp:"準備はばっちりだ",example_zh:"准备得完全没问题。",note:"完璧に整っている様子。目がばっちり開いている（大きく開いている）にも使う。"},
  {id:87,word:"がっちり",reading:"がっちり",meaning:"结实，壮实；牢固地",example_jp:"がっちりした体格の人だ",example_zh:"是个体格结实的人。",note:"体格が頑丈な様子と、しっかり掴む様子の両方がある（がっちり掴む）。"},
  {id:88,word:"ぎゅうぎゅう",reading:"ぎゅうぎゅう",meaning:"拥挤不堪，塞得满满",example_jp:"電車がぎゅうぎゅう詰めだった",example_zh:"电车里挤得满满的。",note:"隙間なく詰め込まれた状態。「すし詰め」と同じニュアンス。"},
  {id:89,word:"すかすか",reading:"すかすか",meaning:"空荡荡，不扎实",example_jp:"このパンはすかすかで食べ応えがない",example_zh:"这个面包空荡荡的，没有嚼劲。",note:"中身が少なくて隙間が多い状態。「がらがら」は人が少ない、「すかすか」は物が少ない。"},
  {id:90,word:"がらがら",reading:"がらがら",meaning:"空空荡荡（人少）；嗓音沙哑；咣当咣当",example_jp:"電車がガラガラで席が空いている",example_zh:"电车空空荡荡的，座位很多。",note:"人や物が少なくて空っぽに近い状態。声がガラガラ（嗄れ声）にも使う。"},
  {id:91,word:"ぱんぱん",reading:"ぱんぱん",meaning:"鼓鼓的，撑得满满",example_jp:"お腹がぱんぱんに膨れた",example_zh:"肚子撑得鼓鼓的。",note:"内側から膨らんで今にも弾けそうな状態。「パンパンに張る」など。"},
  {id:92,word:"ぼろぼろ",reading:"ぼろぼろ",meaning:"破烂不堪；身心俱疲",example_jp:"服がぼろぼろになった",example_zh:"衣服破烂不堪了。",note:"長く使って傷んだ状態。「ぼろぼろ涙が落ちる」（涙がこぼれる）にも使う。"},
  {id:93,word:"ぐちゃぐちゃ",reading:"ぐちゃぐちゃ",meaning:"乱七八糟，一团糟",example_jp:"部屋がぐちゃぐちゃだ",example_zh:"房间乱七八糟的。",note:"秩序なく混乱した状態。「めちゃくちゃ」と似るが「ぐちゃぐちゃ」はより物理的な混乱。"},
  {id:94,word:"しっかり",reading:"しっかり",meaning:"好好地，牢固；认真",example_jp:"しっかりと準備してから臨んだ",example_zh:"认真准备后参加了。",note:"安定していてしっかりとした様子。「がっかり」と音が似ているので注意。"},
  {id:95,word:"わいわい",reading:"わいわい",meaning:"嘈杂，热热闹闹",example_jp:"子供たちがわいわいと騒いでいる",example_zh:"孩子们热热闹闹地闹着。",note:"大勢が楽しく騒ぐ様子。「がやがや」は騒音感が強い、「わいわい」は楽しい感じ。"},
  {id:96,word:"がやがや",reading:"がやがや",meaning:"嘈杂喧嚣，人声鼎沸",example_jp:"会場がガヤガヤとうるさかった",example_zh:"会场里人声嘈杂。",note:"「わいわい」より不快な騒がしさのニュアンスが強い。"},
  {id:97,word:"ざわざわ",reading:"ざわざわ",meaning:"骚动，窃窃私语，一阵骚动",example_jp:"会場がざわざわしてきた",example_zh:"会场开始骚动起来了。",note:"何か起こりそうな時の雰囲気や不安感を伴う騒めき。「わいわい」は楽しい騒ぎ。"},
  {id:98,word:"しーんと",reading:"しーんと",meaning:"鸦雀无声，死一般的寂静",example_jp:"部屋がしーんと静まり返った",example_zh:"房间里寂静得鸦雀无声。",note:"完全な静寂。「しんと」より極端な静けさ。"},
  {id:99,word:"しんと",reading:"しんと",meaning:"静悄悄，一片寂静",example_jp:"夜中はしんと静かだ",example_zh:"深夜里静悄悄的。",note:"「しーんと」よりやや穏やかな静寂。深夜や冬の静けさなど。"},
  {id:100,word:"ぽたぽた",reading:"ぽたぽた",meaning:"滴滴答答（水滴声）",example_jp:"水道からぽたぽたと水が滴った",example_zh:"水龙头滴滴答答地漏水。",note:"液体がゆっくり一滴ずつ落ちる音と様子。"},
  {id:101,word:"ごうごう",reading:"ごうごう",meaning:"轰隆隆（大声响）",example_jp:"滝がごうごうと流れている",example_zh:"瀑布轰隆隆地奔流着。",note:"大きな音量で流れる様子。川の増水、폭風など自然の力強い音に使う。"},
  {id:102,word:"ぱちぱち",reading:"ぱちぱち",meaning:"啪啪（拍手/火声）",example_jp:"観客がぱちぱちと拍手をした",example_zh:"观众啪啪地鼓掌。",note:"拍手の音（パチパチ拍手）と、焚き火の音（パチパチ燃える）の両方に使う。"},
  {id:103,word:"がたん",reading:"がたん",meaning:"咣当（突然撞击声）",example_jp:"電車ががたんと揺れた",example_zh:"电车咣当地晃了一下。",note:"一回だけ大きく揺れる音。「がたがた」は連続した音。"},
  {id:104,word:"どすん",reading:"どすん",meaning:"咚（重物落地声）",example_jp:"荷物がどすんと落ちた",example_zh:"行李咚地一声掉落了。",note:"重いものが落ちる鈍い音。「ドシン」とも書く。"},
  {id:105,word:"ずしん",reading:"ずしん",meaning:"沉甸甸地，重重地",example_jp:"ずしんと体に響く低音だ",example_zh:"低沉的声音沉甸甸地传遍全身。",note:"体に重く響く感覚。物理的な重さと、心理的な重みにも使う。"},
  {id:106,word:"ぴしゃり",reading:"ぴしゃり",meaning:"啪（关/打的声音）；断然地",example_jp:"ドアをぴしゃりと閉めた",example_zh:"啪地把门关上了。",note:"薄いものが素早く閉じる音。「断言する」意味にも（ぴしゃりと言う）。"},
  {id:107,word:"コンコン",reading:"こんこん",meaning:"咚咚（敲门声）；咳嗽声",example_jp:"ドアをコンコンとノックした",example_zh:"咚咚地敲了敲门。",note:"軽く叩く音と、咳の音（コンコン咳が出る）の両方がある。"},
  {id:108,word:"カタカタ",reading:"かたかた",meaning:"咔哒咔哒（轻微震动声）",example_jp:"キーボードをカタカタと打つ",example_zh:"咔哒咔哒地敲键盘。",note:"軽いものが連続して触れ合う音。「ガタガタ」より軽い。"},
  {id:109,word:"ガタガタ",reading:"がたがた",meaning:"咣当咣当（震动/老旧物品）",example_jp:"窓がガタガタ鳴っている",example_zh:"窗户咣当咣当地响。",note:"「カタカタ」より大きく不安定な音。体がガタガタ震える（寒さや恐怖）にも使う。"},
  {id:110,word:"ぺこぺこ",reading:"ぺこぺこ",meaning:"饿得咕咕叫；点头哈腰",example_jp:"おなかがぺこぺこだ",example_zh:"肚子饿得咕咕叫。",note:"お腹が空いた状態と、へりくだって頭を下げる様子の両方がある。"},
  {id:111,word:"がつがつ",reading:"がつがつ",meaning:"狼吞虎咽，贪婪地吃",example_jp:"がつがつと食べるのはやめなさい",example_zh:"别狼吞虎咽地吃。",note:"食欲が旺盛で行儀を気にせず食べる様子。「がっつく」とも言う。"},
  {id:112,word:"ぱくぱく",reading:"ぱくぱく",meaning:"大口大口地吃；嘴巴一张一合",example_jp:"おいしくてぱくぱく食べた",example_zh:"太好吃了，大口大口地吃。",note:"口を大きく開けて食べる様子。魚が口をパクパクする（呼吸）にも使う。"},
  {id:113,word:"もぐもぐ",reading:"もぐもぐ",meaning:"慢慢咀嚼，嚼来嚼去",example_jp:"何かをもぐもぐ食べている",example_zh:"在慢慢咀嚼着什么。",note:"口を閉じてゆっくり噛んでいる様子。口の中でもごもご言うのも似た意味。"},
  {id:114,word:"ごくごく",reading:"ごくごく",meaning:"咕咚咕咚（大口喝水声）",example_jp:"冷たい水をごくごく飲んだ",example_zh:"咕咚咕咚地大口喝了冷水。",note:"大きな口で飲み物を飲み込む音。「ちびちび」の反対。"},
  {id:115,word:"ちびちび",reading:"ちびちび",meaning:"一点一点地喝，小口喝",example_jp:"お酒をちびちびと飲んだ",example_zh:"小口小口地喝酒。",note:"少しずつ飲む様子。酒を楽しみながら飲む風情がある。"},
  {id:116,word:"ぺろぺろ",reading:"ぺろぺろ",meaning:"舔来舔去",example_jp:"アイスをぺろぺろなめた",example_zh:"舔来舔去地吃冰淇淋。",note:"舌を使ってなめる様子。子供や動物のかわいい行為のイメージ。"},
  {id:117,word:"くちゃくちゃ",reading:"くちゃくちゃ",meaning:"嚼东西发出声音；皱巴巴",example_jp:"口をくちゃくちゃさせて食べるな",example_zh:"别嚼东西发出声音。",note:"食べるときに立てる不快な音。日本では特に失礼とされる。"},
  {id:118,word:"いらいら",reading:"いらいら",meaning:"焦躁，烦躁",example_jp:"待たされてイライラする",example_zh:"等得我焦躁不安。",note:"思い通りにならず苛立っている状態。「むかむか」は吐き気や強い怒り、「いらいら」は苛立ち。"},
  {id:119,word:"もやもや",reading:"もやもや",meaning:"郁闷，心里有疙瘩",example_jp:"なんだかもやもやした気持ちだ",example_zh:"心里总有些郁闷，说不清楚。",note:"はっきりしない不快感や違和感。問題が解決されていない時の感覚。"},
  {id:120,word:"うきうき",reading:"うきうき",meaning:"兴奋，心情愉快",example_jp:"旅行の前日はうきうきする",example_zh:"旅行前一天心情愉快，兴奋不已。",note:"楽しいことへの期待で心が浮き立つ様子。「わくわく」と近いが「うきうき」は軽やかさが強い。"},
  {id:121,word:"わくわく",reading:"わくわく",meaning:"兴奋期待，心跳加速",example_jp:"発表会前でわくわくしている",example_zh:"发表会前，心情激动期待。",note:"「うきうき」より高揚感が強い。心臓がドキドキするほどの期待感。"},
  {id:122,word:"どきどき",reading:"どきどき",meaning:"心跳加速（紧张/兴奋）",example_jp:"告白する前はどきどきした",example_zh:"告白前心跳加速。",note:"心臓が速く打つ感覚。緊張にも使えば、興奮や恋愛にも使う。"},
  {id:123,word:"ばくばく",reading:"ばくばく",meaning:"心脏砰砰跳（极度紧张）",example_jp:"プレゼン前に心臓がばくばくした",example_zh:"演讲前心脏砰砰跳。",note:"「どきどき」より激しい心拍。極度の緊張や恐怖のとき。"},
  {id:124,word:"はらはら",reading:"はらはら",meaning:"提心吊胆，捏一把汗；花瓣飘落",example_jp:"綱渡りを見てはらはらした",example_zh:"看走钢丝，提心吊胆。",note:"危ないことを見て不安を感じる様子。花びらがはらはら散る（散る様子）にも使う。"},
  {id:125,word:"そわそわ",reading:"そわそわ",meaning:"坐立不安，心神不定",example_jp:"試験前でそわそわしている",example_zh:"考试前坐立不安。",note:"落ち着きなく動く様子。「うきうき」より不安感が混じる。"},
  {id:126,word:"おどおど",reading:"おどおど",meaning:"战战兢兢，畏畏缩缩",example_jp:"怒られておどおどしていた",example_zh:"被骂了，战战兢兢的。",note:"怖くて縮こまる様子。「びくびく」と近いが「おどおど」はより動きに現れる。"},
  {id:127,word:"びくびく",reading:"びくびく",meaning:"惊惶，提心吊胆",example_jp:"怒られると思ってびくびくした",example_zh:"担心被骂，提心吊胆。",note:"「おどおど」と似ているが、「びくびく」は心理的な怯えが強い。"},
  {id:128,word:"きょとん",reading:"きょとん",meaning:"茫然，一脸困惑",example_jp:"突然のことにきょとんとした",example_zh:"发生了突然的事，一脸茫然。",note:"状況が理解できず呆然としている様子。かわいらしいニュアンスがある。"},
  {id:129,word:"ぽかん",reading:"ぽかん",meaning:"发愣，目瞪口呆",example_jp:"予想外の結果にぽかんとした",example_zh:"没想到这个结果，目瞪口呆。",note:"「きょとん」と似ているが「ぽかん」は口が開くほどの驚き。"},
  {id:130,word:"ぽろぽろ",reading:"ぽろぽろ",meaning:"（泪水）扑簌簌地落；碎裂",example_jp:"感動してぽろぽろ涙がこぼれた",example_zh:"感动得泪水扑簌簌地落下。",note:"涙がこぼれ落ちる様子。「ぼろぼろ（涙）」より静かに落ちるイメージ。"},
  {id:131,word:"めそめそ",reading:"めそめそ",meaning:"哭哭啼啼，抽泣（带抱怨）",example_jp:"めそめそ泣いてばかりいる",example_zh:"光是哭哭啼啼的。",note:"「しくしく」より未練がましいイメージ。小さな子供や弱々しい印象。"},
  {id:132,word:"しくしく",reading:"しくしく",meaning:"抽抽搭搭地哭（轻声）",example_jp:"しくしくと泣いていた",example_zh:"轻声抽抽搭搭地哭着。",note:"「めそめそ」より静かで抑えた泣き方。声を殺して泣く様子。"},
  {id:133,word:"にこにこ",reading:"にこにこ",meaning:"面带微笑，笑眯眯",example_jp:"いつもにこにこしている人だ",example_zh:"是个总是笑眯眯的人。",note:"自然で温かみのある笑顔。「にやにや」とは違い、本当に嬉しい笑い。"},
  {id:134,word:"にやにや",reading:"にやにや",meaning:"偷笑，坏笑，得意洋洋地笑",example_jp:"なぜかにやにやしている",example_zh:"不知为何偷偷地笑。",note:"「にこにこ」と違い、意味ありげな笑い方。不気味に見えることも。"},
  {id:135,word:"にたにた",reading:"にたにた",meaning:"阴险地笑，得意洋洋地笑",example_jp:"にたにたと笑うのが気持ち悪い",example_zh:"那种得意洋洋的笑让人不舒服。",note:"「にやにや」と似ているが、より気持ち悪い・不気味なニュアンスが強い。"},
  {id:136,word:"くすくす",reading:"くすくす",meaning:"窃笑，吃吃地笑（轻声）",example_jp:"くすくす笑いが止まらなかった",example_zh:"忍不住吃吃地笑个不停。",note:"声を殺して笑う様子。「げらげら」の反対。上品または恥ずかしい時の笑い。"},
  {id:137,word:"げらげら",reading:"げらげら",meaning:"放声大笑，哈哈大笑",example_jp:"ドラマを見てげらげら笑った",example_zh:"看电视剧，哈哈大笑。",note:"大きな声で笑う様子。「くすくす」の反対。品がない笑い方のイメージも。"},
  {id:138,word:"うんざり",reading:"うんざり",meaning:"厌烦，腻烦",example_jp:"同じことばかりでうんざりする",example_zh:"总是同样的事情，真腻烦了。",note:"同じことが繰り返されて嫌になる感覚。「げんなり」と似るが「うんざり」は繰り返しへの嫌気。"},
  {id:139,word:"げんなり",reading:"げんなり",meaning:"无精打采，萎靡不振",example_jp:"暑さでげんなりしている",example_zh:"热得无精打采。",note:"疲れや暑さなどで気力が失われた様子。「うんざり」は繰り返しへの嫌気、「げんなり」は疲弊感。"},
  {id:140,word:"がっかり",reading:"がっかり",meaning:"失望，沮丧",example_jp:"試験に落ちてがっかりした",example_zh:"考试落榜了，很沮丧。",note:"期待外れで気落ちする様子。「しょんぼり」はがっかりの後の様子。"},
  {id:141,word:"しょんぼり",reading:"しょんぼり",meaning:"垂头丧气，无精打采",example_jp:"叱られてしょんぼりしている",example_zh:"被骂了，垂头丧气的。",note:"「がっかり」の後の落ち込んだ状態。特に小動物や子供に使うかわいらしいニュアンスも。"},
  {id:142,word:"ほっと",reading:"ほっと",meaning:"松了一口气，如释重负",example_jp:"無事で終わってほっとした",example_zh:"安然无事地结束了，松了口气。",note:"緊張が解れる瞬間。「ほっとする」「ほっと一息」など。"},
  {id:143,word:"ほのぼの",reading:"ほのぼの",meaning:"温馨，暖心，治愈",example_jp:"ほのぼのとした気持ちになった",example_zh:"心里涌起温馨的感觉。",note:"心が温かく和む様子。「ほっこり」と近いが「ほのぼの」の方が穏やかでゆったりした感じ。"},
  {id:144,word:"ほっこり",reading:"ほっこり",meaning:"暖心，温馨（关西语源）",example_jp:"ほっこりとした気持ちになった",example_zh:"心里暖暖的。",note:"関西弁由来で全国に広まった表現。「ほのぼの」より内側から温まる感じ。"},
  {id:145,word:"のんびり",reading:"のんびり",meaning:"悠闲，无拘无束",example_jp:"休日はのんびり過ごした",example_zh:"假日悠闲地度过。",note:"心に余裕があってリラックスしている様子。「まったり」はより動かない・まろやかな感じ。"},
  {id:146,word:"まったり",reading:"まったり",meaning:"放松，悠哉悠哉；浓郁（口感）",example_jp:"家でまったりする時間が好きだ",example_zh:"喜欢在家里悠哉悠哉地放松的时间。",note:"「のんびり」よりさらにゆったりした感じ。味がまったりしている（コクがある）にも使う。"},
  {id:147,word:"くよくよ",reading:"くよくよ",meaning:"老是烦恼，想不开",example_jp:"くよくよ悩んでも仕方ない",example_zh:"老想着也没用，想开点吧。",note:"過去の失敗などを引きずって悩み続ける様子。否定的なニュアンス。"},
  {id:148,word:"もんもん",reading:"もんもん",meaning:"郁郁寡欢，苦闷",example_jp:"もんもんとした気持ちが続く",example_zh:"苦闷的心情持续着。",note:"解決できない問題を抱えてくすぶっている状態。「もやもや」より暗く深刻。"},
  {id:149,word:"ぴりぴり",reading:"ぴりぴり",meaning:"神经紧绷，剑拔弩张；辣嗖嗖",example_jp:"試験前で教室がぴりぴりしている",example_zh:"考试前教室里气氛紧绷。",note:"辛い刺激（ぴりぴり辛い）と、雰囲気が緊張している両方に使う。"},
  {id:150,word:"ぞくぞく",reading:"ぞくぞく",meaning:"（寒冷/恐惧/兴奋）战栗",example_jp:"恐怖映画を見てぞくぞくした",example_zh:"看恐怖电影，让人不寒而栗。",note:"寒さ・恐怖・期待・興奮など、体が震える感覚全般。"},
  {id:151,word:"ぞっと",reading:"ぞっと",meaning:"不寒而栗，毛骨悚然（一瞬）",example_jp:"その話を聞いてぞっとした",example_zh:"听了那话，不寒而栗。",note:"「ぞくぞく」は継続的な感覚、「ぞっと」は一瞬強い恐怖が走る瞬間的な感覚。"},
  {id:152,word:"きゅん",reading:"きゅん",meaning:"心头一颤，怦然心动",example_jp:"その一言にきゅんとした",example_zh:"那句话让心头一颤。",note:"胸が締め付けられるような感覚。恋愛や感動の場面で使う。「キュン死」などの表現も。"},
  {id:153,word:"じーん",reading:"じーん",meaning:"心头一热，感动得发麻",example_jp:"感動でじーんとした",example_zh:"感动得心头一热。",note:"感動が体に染み渡る感覚。「じんわり」と近いが「じーん」は瞬間的、「じんわり」は徐々に広がる。"},
  {id:154,word:"ずーん",reading:"ずーん",meaning:"心情沉重，一沉",example_jp:"悪い知らせにずーんとした",example_zh:"听到坏消息，心情一沉。",note:"重く落ち込む感覚。体にずっしり響くような心理的な重さ。"},
  {id:155,word:"うっとり",reading:"うっとり",meaning:"陶醉，出神",example_jp:"美しい音楽にうっとりした",example_zh:"被美丽的音乐所陶醉。",note:"素晴らしいものに魅了されて恍惚とする様子。"},
  {id:156,word:"めろめろ",reading:"めろめろ",meaning:"神魂颠倒，完全着迷",example_jp:"かわいい子犬にめろめろだ",example_zh:"被可爱的小狗迷得神魂颠倒。",note:"愛情や魅力で理性が失われるほどの状態。恋愛や動物への溺愛に使う。"},
  {id:157,word:"ぽっちゃり",reading:"ぽっちゃり",meaning:"肉乎乎，微胖（可爱感）",example_jp:"ぽっちゃりした猫がかわいい",example_zh:"胖乎乎的猫好可爱。",note:"「太っている」より柔らかく丸いイメージ。可愛らしいニュアンスがある。"},
  {id:158,word:"ほっそり",reading:"ほっそり",meaning:"苗条，纤细（褒义）",example_jp:"ほっそりとした体型だ",example_zh:"是个苗条的身材。",note:"細くて優美な体型。「スラッと」に近いが「ほっそり」の方が柔らかい印象。"},
  {id:159,word:"がっしり",reading:"がっしり",meaning:"壮实，结实（体型）",example_jp:"がっしりした体格の人だ",example_zh:"是个体格壮实的人。",note:"筋肉質で頑丈な体格。「ほっそり」の対義語。"},
  {id:160,word:"ひょろひょろ",reading:"ひょろひょろ",meaning:"细高挑，瘦骨嶙峋",example_jp:"ひょろひょろした体型だ",example_zh:"是个细高挑的体型。",note:"背が高くて細すぎる体型。「ほっそり」より健康的でないニュアンス。"},
  {id:161,word:"ぼさぼさ",reading:"ぼさぼさ",meaning:"蓬乱，邋遢（头发）",example_jp:"寝坊して髪がぼさぼさだ",example_zh:"睡过头了，头发蓬乱。",note:"髪型が乱れているさま。「もじゃもじゃ」はもつれている感じ、「ぼさぼさ」はボリュームがない。"},
  {id:162,word:"もじゃもじゃ",reading:"もじゃもじゃ",meaning:"蓬乱，杂乱（浓密）",example_jp:"髪がもじゃもじゃだ",example_zh:"头发乱蓬蓬的。",note:"「ぼさぼさ」より毛量が多くもつれている感じ。"},
  {id:163,word:"ふさふさ",reading:"ふさふさ",meaning:"浓密，茂密（头发/毛）",example_jp:"ふさふさとした髪の毛が羨ましい",example_zh:"真羡慕那浓密的头发。",note:"毛量が豊富で美しい様子。「ぼさぼさ」「もじゃもじゃ」とは違い、美しいニュアンス。"},
  {id:164,word:"きちっと",reading:"きちっと",meaning:"整整齐齐，一丝不苟",example_jp:"きちっとした服装で来た",example_zh:"穿着整整齐齐地来了。",note:"「ちゃんと」より几帳面で乱れがない。"},
  {id:165,word:"こざっぱり",reading:"こざっぱり",meaning:"干净利落，整洁清爽",example_jp:"こざっぱりした身なりだ",example_zh:"打扮得干净利落。",note:"清潔感があってすっきりしている様子。地味だが清潔なイメージ。"},
  {id:166,word:"ちゃらちゃら",reading:"ちゃらちゃら",meaning:"轻浮，浮夸（负面）",example_jp:"ちゃらちゃらした若者だ",example_zh:"是个轻浮的年轻人。",note:"服装や態度が軽薄な様子。否定的なニュアンス。"},
  {id:167,word:"しっとり",reading:"しっとり",meaning:"湿润，温柔体贴；低调优雅",example_jp:"しっとりとした雰囲気の女性だ",example_zh:"是位气质温柔优雅的女性。",note:"適度な湿気がある様子（しっとりした肌）と、落ち着いた雰囲気（しっとりした人）の両方。"},
  {id:168,word:"すらっと",reading:"すらっと",meaning:"修长，亭亭玉立",example_jp:"すらっとした足が素敵だ",example_zh:"修长的双腿真漂亮。",note:"「ほっそり」と近いが「すらっと」は縦への長さを強調する。"},
  {id:169,word:"ぺちゃくちゃ",reading:"ぺちゃくちゃ",meaning:"叽叽喳喳，喋喋不休",example_jp:"女の子たちがぺちゃくちゃおしゃべりしている",example_zh:"女孩们叽叽喳喳地聊个不停。",note:"主に女性や子供が楽しそうに話す様子に使う。批判的ではないが少し軽いニュアンス。"},
  {id:170,word:"べらべら",reading:"べらべら",meaning:"哇啦哇啦；随便乱说",example_jp:"秘密をべらべら話してしまった",example_zh:"把秘密哇啦哇啦地说出去了。",note:"「ぺらぺら」は外国語が流暢な意味、「べらべら」は控えるべきことを話してしまう意味。"},
  {id:171,word:"ぺらぺら",reading:"ぺらぺら",meaning:"（说外语）流利；薄薄的",example_jp:"英語をぺらぺら話す",example_zh:"流利地说英语。",note:"外国語が上手に話せる意味が主。紙などが薄い意味もある（ぺらぺらの紙）。"},
  {id:172,word:"もごもご",reading:"もごもご",meaning:"含混不清，嘟嘟囔囔",example_jp:"もごもごと口の中で言った",example_zh:"在嘴里嘟嘟囔囔地说。",note:"口を大きく開けず不明瞭に話す様子。「ぼそぼそ」は声が小さい、「もごもご」は発音が不明瞭。"},
  {id:173,word:"ぼそぼそ",reading:"ぼそぼそ",meaning:"嘟囔，小声说；干巴巴",example_jp:"ぼそぼそと話すので聞こえない",example_zh:"说话嘟嘟囔囔的，听不清楚。",note:"声が小さく聞き取りにくい話し方。食感にも使う（ぼそぼそしたパン＝水分が少ないパン）。"},
  {id:174,word:"はきはき",reading:"はきはき",meaning:"说话清晰，干脆利落",example_jp:"はきはきと受け答えした",example_zh:"干脆利落地回答了。",note:"明瞭で歯切れのよい話し方。就職面接などで求められる。"},
  {id:175,word:"ずばずば",reading:"ずばずば",meaning:"直言不讳，直截了当",example_jp:"ずばずばと本音を言う人だ",example_zh:"是个直言不讳说真话的人。",note:"「ずけずけ」と似ているが「ずばずば」は的を射た発言、「ずけずけ」は相手への配慮がない。"},
  {id:176,word:"ずけずけ",reading:"ずけずけ",meaning:"毫不客气，说话不顾对方感受",example_jp:"ずけずけと批判してくる",example_zh:"毫不客气地批评过来。",note:"「ずばずば」より配慮がなく失礼なニュアンスが強い。"},
  {id:177,word:"ひそひそ",reading:"ひそひそ",meaning:"窃窃私语，低声耳语",example_jp:"ひそひそと話している",example_zh:"在窃窃私语。",note:"小声で内緒話をする様子。「こそこそ」は隠れて行動、「ひそひそ」は声を潜める動作。"},
  {id:178,word:"こそこそ",reading:"こそこそ",meaning:"鬼鬼祟祟，悄悄地（隐瞒感）",example_jp:"こそこそと話しているのが怪しい",example_zh:"鬼鬼祟祟地说话，很可疑。",note:"「ひそひそ」は声を潜めること、「こそこそ」は行動全体が隠密的であること。"},

// ===== STATE =====
const STORAGE_KEY = 'onomatope_v2';
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return { scores:{}, lastReview:{}, reviewCount:{}, daily:10, todayDone:0 };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

// ===== SRS =====
// Score meanings: 0=skip(never), 1=hard(reviews often), 2=ok, 3=easy(reviews rarely)
// Intervals in days: 1=short, 2=medium, 3=long
const BASE_INTERVALS = { 1: 0.5, 2: 3, 3: 10 };
function nextIntervalMs(score, reviewCount) {
  if (score === 0) return Infinity;
  const base = BASE_INTERVALS[score] || 1;
  return base * Math.pow(1.8, Math.max(0, reviewCount - 1)) * 86400000;
}
function getTodayStr() { return new Date().toISOString().slice(0,10); }

function buildTodayQueue() {
  const now = Date.now();
  const due = [], newCards = [];
  CARDS.forEach(c => {
    const score = state.scores[c.id];
    if (score === 0) return; // permanently skipped
    const last = state.lastReview[c.id];
    if (!last) { newCards.push(c.id); return; }
    const revCount = state.reviewCount[c.id] || 0;
    if (now >= last + nextIntervalMs(score, revCount)) due.push(c.id);
  });
  function shuffle(a) {
    for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  const newToday = Math.max(0, state.daily - due.length);
  return [...shuffle(due), ...shuffle(newCards).slice(0, newToday)];
}

function getDueCount() {
  const now = Date.now();
  return CARDS.filter(c => {
    const score = state.scores[c.id];
    if (!score || score===0) return false;
    const last = state.lastReview[c.id];
    if (!last) return false;
    return now >= last + nextIntervalMs(score, state.reviewCount[c.id]||0);
  }).length;
}

// ===== STUDY =====
let queue = [];
let qIdx = 0;
let currentId = null;
let pendingScore = null;

const PART_EMOJI = {
  '校园篇':'🎓','职场工作篇':'💼','恋爱结婚篇':'💕',
  '手机篇':'📱','网络篇':'💻','外形篇':'👗',
  '性格篇':'🧠','电视篇':'📺','兴趣篇':'🎮',
  '生活用语篇':'💬','番外篇':'🔤'
};

function initStudy() {
  queue = buildTodayQueue();
  qIdx = 0;
  showCard();
}

function showCard() {
  // clear done overlay
  const ov = document.getElementById('done-overlay');
  if (ov) ov.remove();
  document.getElementById('score-row').style.display = '';

  if (qIdx >= queue.length) { showDone(); return; }

  currentId = queue[qIdx];
  const card = CARDS.find(c => c.id === currentId);
  if (!card) { qIdx++; showCard(); return; }

  pendingScore = null;
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));

  // fill DOM
  document.getElementById('card-part').textContent = card.part;
  document.getElementById('card-num').textContent = `${qIdx+1} / ${queue.length}`;
  document.getElementById('card-word').textContent = card.word;
  document.getElementById('card-reading').textContent = card.reading;
  document.getElementById('card-meaning').textContent = card.meaning;
  document.getElementById('card-ex-jp').textContent = card.example_jp;
  const _exZh = document.getElementById('card-ex-zh');
  if (_exZh) _exZh.textContent = card.example_zh || '';
  const _note = document.getElementById('card-note');
  const _noteTxt = document.getElementById('card-note-text');
  if (_note && _noteTxt) {
    if (card.note) { _noteTxt.textContent = card.note; _note.style.display = ''; }
    else { _note.style.display = 'none'; }
  }

  updateProgress();

  const el = document.getElementById('the-card');
  el.classList.remove('card-enter');
  void el.offsetWidth;
  el.classList.add('card-enter');
}

function showDone() {
  document.getElementById('score-row').style.display = 'none';
  updateProgress();
  const cc = document.getElementById('card-container');
  let ov = document.createElement('div');
  ov.id = 'done-overlay';
  const s0=Object.values(state.scores).filter(s=>s===0).length;
  const s1=Object.values(state.scores).filter(s=>s===1).length;
  const s2=Object.values(state.scores).filter(s=>s===2).length;
  const s3=Object.values(state.scores).filter(s=>s===3).length;
  // check if there are unseen cards left
  const unseenLeft = CARDS.filter(c => !state.lastReview[c.id] && state.scores[c.id] !== 0).length;
  const moreBtn = unseenLeft > 0
    ? `<button class="more-btn" id="more-group-btn">＋ 再学一组（10个）</button>`
    : `<div class="done-note-sub">所有词汇已学完 🎊</div>`;
  ov.innerHTML = `
    <span class="done-emoji">✨</span>
    <div class="done-title">今日完了！</div>
    <div class="done-sub">学习了 ${state.todayDone} 张卡片</div>
    <div class="done-stats">
      <div class="done-stat" style="background:#1e1e24;border-color:var(--border)">
        <div class="dv" style="color:var(--text3)">${s0}</div><div class="dl">跳过</div>
      </div>
      <div class="done-stat" style="background:#0d1f35;border-color:#1e3a5f">
        <div class="dv" style="color:var(--blue)">${s1}</div><div class="dl">好难</div>
      </div>
      <div class="done-stat" style="background:#1a1800;border-color:#3a3200">
        <div class="dv" style="color:var(--gold)">${s2}</div><div class="dl">还好</div>
      </div>
      <div class="done-stat" style="background:#200e0e;border-color:#3d1a1a">
        <div class="dv" style="color:var(--green)">${s3}</div><div class="dl">很熟</div>
      </div>
    </div>
    ${moreBtn}
    <div class="done-note">明日また復習しよう 🌙</div>`;
  cc.appendChild(ov);
  if (unseenLeft > 0) {
    document.getElementById('more-group-btn').addEventListener('click', learnMoreGroup);
  }
}

function learnMoreGroup() {
  // pick next 10 unseen cards and append to queue
  const unseenIds = CARDS
    .filter(c => !state.lastReview[c.id] && state.scores[c.id] !== 0)
    .map(c => c.id)
    .slice(0, 10);
  if (unseenIds.length === 0) { showToast('没有更多新词了'); return; }
  queue = [...queue, ...unseenIds];
  // remove done overlay and resume
  const ov = document.getElementById('done-overlay');
  if (ov) ov.remove();
  document.getElementById('score-row').style.display = '';
  showCard();
}

function updateProgress() {
  const total = queue.length;
  const pct = total ? (qIdx / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-num').textContent = total ? `${qIdx} / ${total}` : '—';
}

function applyScore(score) {
  if (!currentId) return;
  pendingScore = score;
  document.querySelectorAll('.score-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.score) === score));
  setTimeout(advance, 300);
}

function advance() {
  if (pendingScore === null || !currentId) return;
  state.scores[currentId] = pendingScore;
  state.lastReview[currentId] = Date.now();
  state.reviewCount[currentId] = (state.reviewCount[currentId] || 0) + 1;
  state.todayDone++;
  qIdx++;
  saveState();
  showCard();
}

document.querySelectorAll('.score-btn').forEach(btn =>
  btn.addEventListener('click', () => applyScore(parseInt(btn.dataset.score))));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === '0' || e.key === '-') applyScore(0);
  else if (e.key === '1') applyScore(1);
  else if (e.key === '2') applyScore(2);
  else if (e.key === '3') applyScore(3);
});


// Swipe
let tx=0, ty=0;
document.getElementById('card-container').addEventListener('touchstart', e => {
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
}, {passive:true});
document.getElementById('card-container').addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5 && pendingScore!==null) advance();
}, {passive:true});

let jaVoice = null;
if (window.speechSynthesis) {
  const loadV = () => { jaVoice = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'))||null; };
  loadV(); speechSynthesis.onvoiceschanged = loadV;
}
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.85;
  if (jaVoice) u.voice=jaVoice;
  speechSynthesis.speak(u);
}
document.getElementById('tts-word').addEventListener('click', () => {

});

    `<button class="filter-chip ${p===browseFilter?'active':''}" data-part="${p}">${p}</button>`
  ).join('');

  document.getElementById('word-list').innerHTML=filtered.map(card=>{
    const seen=state.lastReview[card.id];
    const score=state.scores[card.id];
    const badge=seen?(score===0?'—':score??'?'):'新';
    const bc=seen?`badge-${score??'new'}`:'badge-new';
    return `<div class="word-item" data-id="${card.id}">
      <div class="wi">${card.word}</div>
      <div class="winfo"><div class="wm">${card.meaning}</div><div class="wr">${card.reading}</div></div>
      <div class="word-badge ${bc}">${badge}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.filter-chip').forEach(b=>
    b.addEventListener('click',()=>{browseFilter=b.dataset.part;renderBrowse();}));
  document.querySelectorAll('.word-item').forEach(item=>
    item.addEventListener('click',()=>openModal(parseInt(item.dataset.id))));
}

let modalCardId = null;
function openModal(id) {
  const card=CARDS.find(c=>c.id===id); if(!card) return;
  modalCardId=id;
  document.getElementById('modal-word').textContent=card.word;
  document.getElementById('modal-reading').textContent=card.reading;
  document.getElementById('modal-meaning').textContent=card.meaning;
  document.getElementById('modal-exp').textContent=card.explanation;
  document.getElementById('modal-ex-jp').textContent=card.example_jp;
  const _mExZh=document.getElementById('modal-ex-zh');
  if(_mExZh) _mExZh.textContent=card.example_zh||'';
  const _mNote=document.getElementById('modal-note');
  if(_mNote){ if(card.note){ _mNote.textContent=card.note; _mNote.style.display=''; } else _mNote.style.display='none'; }
  const cur=state.scores[id];
  document.querySelectorAll('.modal-score-btn').forEach(b=>
    b.classList.toggle('active',parseInt(b.dataset.score)===cur));
  document.getElementById('modal-overlay').classList.remove('hidden');
}
document.getElementById('modal-close').addEventListener('click',()=>
  document.getElementById('modal-overlay').classList.add('hidden'));
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
});
document.querySelectorAll('.modal-score-btn').forEach(btn=>btn.addEventListener('click',()=>{
  if(!modalCardId) return;
  const score=parseInt(btn.dataset.score);
  state.scores[modalCardId]=score;
  if(!state.lastReview[modalCardId]) state.lastReview[modalCardId]=Date.now();
  state.reviewCount[modalCardId]=state.reviewCount[modalCardId]||0;
  saveState();
  document.querySelectorAll('.modal-score-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showToast('已标记');
  renderBrowse();
}));

// ===== INIT =====
initStudy();
</script>
