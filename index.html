<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>N1語彙カード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f12;
  --surface: #1a1a20;
  --surface2: #22222a;
  --border: #2e2e38;
  --accent: #e8522a;
  --accent-dim: rgba(232,82,42,0.15);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #f0ede8;
  --text2: #c8c8d8;
  --text3: #888898;
  --green: #4caf7d;
  --blue: #5b8dee;
  --red: #e05555;
  --nav-h: 52px;
  --bot-h: 62px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px;
  gap: 12px;
}
.nav-logo {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900; font-size: 13px;
  color: var(--text); letter-spacing: 0.08em;
  flex: 1;
}
.nav-logo span { color: var(--accent); }
.nav-settings-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ── MAIN ── */
.main {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  bottom: var(--bot-h);
  overflow: hidden;
}
.screen {
  position: absolute; inset: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--bg);
}
.screen.hidden { display: none; }

/* ── STUDY SCREEN ── */
#study-screen {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 14px 14px 8px;
}

/* Progress */
.prog-wrap {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.prog-bar-bg {
  flex: 1; height: 2px;
  background: var(--border); border-radius: 1px; overflow: hidden;
}
.prog-bar-fill {
  height: 100%; background: var(--accent); border-radius: 1px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}
.prog-text {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; color: var(--text3);
  min-width: 40px; text-align: right;
}

/* Card */
.card-container {
  width: 100%; max-width: 480px;
  position: relative; touch-action: pan-y;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0;
  overflow: hidden;
  position: relative;
}

.card-stripe {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--gold));
}

.card-body {
  padding: 16px 18px 18px;
}

.card-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.card-part-tag {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 3px 8px; border-radius: 4px;
}
.card-num {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; color: var(--text3);
}

.card-main {
  margin-bottom: 14px;
}

.card-word {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 36px; font-weight: 900; line-height: 1.1;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 3px;
}
.card-reading {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; color: var(--text3);
  letter-spacing: 0.05em; margin-bottom: 10px;
}
.card-tts-row {
  display: flex; gap: 6px;
}
.tts-btn {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  font-size: 10px; color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap; transition: all 0.15s;
}
.tts-btn:active { background: var(--border); color: var(--text); }

.card-divider {
  height: 1px; background: var(--border); margin-bottom: 12px;
}

.card-meaning {
  font-size: 17px; font-weight: 600;
  color: var(--text); margin-bottom: 8px; line-height: 1.5;
}

.card-explanation {
  font-size: 12px; color: var(--text);
  line-height: 1.8; margin-bottom: 12px;
}

.card-example {
  background: var(--surface2);
  border-left: 2px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
}
.card-example .jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; color: var(--text);
  line-height: 1.7; margin-bottom: 3px;
}
.card-example .zh {
  font-size: 11px; color: var(--text2); line-height: 1.5;
}

/* Score row */
.score-row {
  display: flex; gap: 7px;
  width: 100%; max-width: 480px;
  margin-top: 10px;
}
.score-btn {
  flex: 1; padding: 10px 4px;
  border-radius: 12px; border: 1px solid transparent;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: transform 0.12s, border-color 0.12s;
  font-weight: 700;
}
.score-btn:active { transform: scale(0.93); }
.score-btn .sn { font-size: 18px; line-height: 1; }
.score-btn .sl { font-size: 9px; opacity: 1; }

.score-btn[data-score="0"] { background: #1e1e24; color: #888898; border-color: var(--border); }
.score-btn[data-score="1"] { background: #0d1f35; color: var(--blue); border-color: #1e3a5f; }
.score-btn[data-score="2"] { background: #1a1800; color: var(--gold); border-color: #3a3200; }
.score-btn[data-score="3"] { background: #200e0e; color: var(--red); border-color: #3d1a1a; }
.score-btn.active {
  transform: scale(1.06);
  box-shadow: 0 0 0 2px currentColor;
}

.hint-text {
  font-size: 10px; color: var(--text3);
  text-align: center; margin-top: 6px;
  width: 100%; max-width: 480px;
}

/* card animation */
.card-enter { animation: cardIn 0.28s cubic-bezier(.34,1.4,.64,1); }
@keyframes cardIn {
  from { transform: scale(0.93) translateY(16px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* ── SETTINGS PANEL (slide up) ── */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 300; display: flex; align-items: flex-end;
}
.settings-overlay.hidden { display: none; }
.settings-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%; padding: 28px 22px 40px;
  animation: slideUp 0.28s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.settings-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 24px; letter-spacing: 0.06em;
}
.settings-row {
  margin-bottom: 24px;
}
.settings-label {
  font-size: 11px; color: var(--text3);
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em; margin-bottom: 12px;
  text-transform: uppercase;
}
.daily-picker {
  display: flex; align-items: center; gap: 14px;
}
.daily-num {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 52px; font-weight: 900;
  color: var(--accent); min-width: 72px; text-align: center;
  line-height: 1;
}
.daily-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; background: var(--border); border-radius: 2px;
  outline: none; accent-color: var(--accent);
}
.daily-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 2px 8px rgba(232,82,42,0.4);
}
.settings-info {
  font-size: 12px; color: var(--text3); margin-top: 8px;
  line-height: 1.6;
}
.settings-close-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.06em;
}
.settings-close-btn:active { opacity: 0.85; }
.reset-link {
  display: block; text-align: center; margin-top: 14px;
  font-size: 12px; color: var(--text3); cursor: pointer;
  padding: 6px;
}
.reset-link:active { color: var(--red); }

/* ── PLAN SCREEN ── */
#plan-screen {
  padding: 20px 16px 20px;
}
.screen-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 18px;
}
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
}
.stat-card .sv {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 30px; font-weight: 900; color: var(--text);
  line-height: 1;
}
.stat-card .sv.accent { color: var(--accent); }
.stat-card .sl {
  font-size: 10px; color: var(--text3);
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em; margin-top: 4px;
}
.section-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 18px;
  margin-bottom: 14px;
}
.section-block-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px;
}
.score-dist {
  display: flex; gap: 8px;
}
.score-dist-item {
  flex: 1; text-align: center; border-radius: 10px; padding: 10px 4px;
}
.score-dist-item .dc { font-size: 22px; font-weight: 900; line-height: 1; }
.score-dist-item .dl { font-size: 9px; margin-top: 4px; color: var(--text3); }

.part-list { display: flex; flex-direction: column; gap: 10px; }
.part-item { display: flex; align-items: center; gap: 10px; }
.part-name { font-size: 12px; color: var(--text); flex: 1.2; }
.part-bar-bg { flex: 2; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.part-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }
.part-pct { font-size: 11px; color: var(--text3); min-width: 30px; text-align: right;
  font-family: 'Noto Sans JP', sans-serif; }

/* ── BROWSE SCREEN ── */
#browse-screen { padding: 16px; }
.browse-filters {
  display: flex; gap: 7px; margin-bottom: 14px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.browse-filters::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 11px; cursor: pointer; font-family: inherit;
  color: var(--text2); white-space: nowrap; transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

.word-list { display: flex; flex-direction: column; gap: 7px; }
.word-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color 0.15s;
}
.word-item:active { border-color: var(--accent); }
.word-item .wi { 
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 19px; font-weight: 700;
  color: var(--text); min-width: 72px;
}
.word-item .winfo { flex: 1; }
.word-item .wm { font-size: 12px; color: var(--text); }
.word-item .wr { font-size: 10px; color: var(--text2); margin-top: 2px; }
.word-badge {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
  font-family: 'Noto Sans JP', sans-serif;
}
.badge-new { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.badge-0 { background: #2a2a30; color: var(--text3); }
.badge-1 { background: #0d1f35; color: var(--blue); }
.badge-2 { background: #1a1800; color: var(--gold); }
.badge-3 { background: #200e0e; color: var(--red); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 200; display: flex; align-items: flex-end;
}
.modal-overlay.hidden { display: none; }
.modal-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%; padding: 24px 20px 40px;
  max-height: 82vh; overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s cubic-bezier(.34,1.2,.64,1);
}
.modal-close {
  position: absolute; top: 18px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 14px; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}
.modal-word {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 40px; font-weight: 900; color: var(--text);
  margin-bottom: 4px;
}
.modal-reading { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.modal-meaning { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.modal-exp { font-size: 13px; color: var(--text); line-height: 1.8; margin-bottom: 12px; }
.modal-ex {
  background: var(--surface2);
  border-left: 2px solid var(--gold);
  padding: 10px 12px; border-radius: 0 8px 8px 0; margin-bottom: 16px;
}
.modal-ex .jp { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--text); margin-bottom: 4px; }
.modal-ex .zh { font-size: 11px; color: var(--text3); }
.modal-score-row { display: flex; gap: 7px; margin-top: 4px; }
.modal-score-btn {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid transparent;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.modal-score-btn[data-score="0"] { background: #1e1e24; color: var(--text3); border-color: var(--border); }
.modal-score-btn[data-score="1"] { background: #0d1f35; color: var(--blue); border-color: #1e3a5f; }
.modal-score-btn[data-score="2"] { background: #1a1800; color: var(--gold); border-color: #3a3200; }
.modal-score-btn[data-score="3"] { background: #200e0e; color: var(--red); border-color: #3d1a1a; }
.modal-score-btn.active { box-shadow: 0 0 0 2px currentColor; }
.modal-score-label { font-size: 9px; opacity: 0.7; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bot-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; border: none; background: none;
  cursor: pointer; font-family: inherit;
  color: var(--text3); font-size: 9px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.06em;
  transition: color 0.15s;
}
.bnav-btn .bicon { font-size: 20px; }
.bnav-btn.active { color: var(--accent); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 20px;
  font-size: 12px; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
  font-family: 'Noto Sans JP', sans-serif;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DONE STATE ── */
#done-overlay {
  padding: 32px 20px;
  text-align: center;
}
.done-emoji { font-size: 56px; margin-bottom: 14px; display: block; }
.done-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 20px; font-weight: 900; color: var(--text);
  margin-bottom: 6px;
}
.done-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
.done-stats {
  display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 16px;
}
.done-stat {
  border-radius: 12px; padding: 10px 14px; text-align: center;
  border: 1px solid var(--border); min-width: 64px;
}
.done-stat .dv { font-size: 24px; font-weight: 900; line-height: 1; }
.done-stat .dl { font-size: 9px; color: var(--text3); margin-top: 3px; }
.done-note { font-size: 11px; color: var(--text3); }
.done-note-sub { font-size: 12px; color: var(--gold); margin-bottom: 4px; }
.more-btn {
  width: 100%; padding: 13px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  color: var(--accent);
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
  transition: background 0.15s;
}
.more-btn:active { background: var(--accent-dim); }

  /* ── CATEGORY FILTER ── */
  .cat-filter-wrap {
    width: 100%; max-width: 480px;
    margin-bottom: 6px;
  }
  .cat-filter-row {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .cat-filter-row::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; padding: 4px 11px;
    border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); font-size: 10px;
    color: var(--text2); cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .cat-chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">N1語彙<span>カード</span></div>
  <div class="nav-settings-btn" id="settingsBtn">⚙</div>
</nav>

<!-- SETTINGS PANEL -->
<div class="settings-overlay hidden" id="settings-overlay">
  <div class="settings-sheet">
    <div class="settings-title">学習設定</div>
    <div class="settings-row">
      <div class="settings-label">每日新词数量</div>
      <div class="daily-picker">
        <div class="daily-num" id="daily-val">10</div>
        <input type="range" class="daily-slider" id="daily-slider" min="3" max="50" value="10">
      </div>
      <div class="settings-info" id="settings-info">每天学 10 个新词，约需 22 天学完全部词汇</div>
    </div>
    <button class="settings-close-btn" id="settings-close">确认</button>
    <span class="reset-link" id="reset-btn">重置所有进度</span>
  </div>
</div>

<div class="main">

  <!-- STUDY SCREEN -->
  <div class="screen" id="study-screen">
    <div class="cat-filter-wrap">
      <div class="cat-filter-row" id="study-cat-filter"></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar-bg">
        <div class="prog-bar-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="prog-text" id="prog-num">0 / 0</div>
    </div>

    <div class="card-container" id="card-container">
      <div class="card card-enter" id="the-card">
        <div class="card-stripe"></div>
        <div class="card-body">
          <div class="card-meta">
            <div class="card-part-tag" id="card-part">—</div>
            <div class="card-num" id="card-num"></div>
          </div>
          <div class="card-main">
            <div class="card-main-left">
              <div class="card-word" id="card-word"></div>
              <div class="card-reading" id="card-reading"></div>
              <div class="card-tts-row">

// ===== CATEGORY FILTER =====
const ALL_CATS = ['全部', '動詞', '形容詞', '副詞・接続', '慣用句', 'ビジネス・法律', '政治・社会', '心理・感情', '生活・文化', '文化・芸術', '科学・技術', '自然・科学'];
let activeCat = '全部';

function filteredCards() {
  if (activeCat === '全部') return CARDS;
  return CARDS.filter(c => c.cat === activeCat);
}

function renderStudyCatFilter() {
  const wrap = document.getElementById('study-cat-filter');
  if (!wrap) return;
  wrap.innerHTML = ALL_CATS.map(c =>
    `<button class="cat-chip ${c === activeCat ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  wrap.querySelectorAll('.cat-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      wrap.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCat));
      initStudy();
    });
  });
}

// ===== STATE =====
const STORAGE_KEY = 'n1_cat';
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return { scores:{}, lastReview:{}, reviewCount:{}, daily:10, todayDone:0 };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

// ===== SRS =====
// Score meanings: 0=skip(never), 1=hard(reviews often), 2=ok, 3=easy(reviews rarely)
// Intervals in days: 1=short, 2=medium, 3=long
const BASE_INTERVALS = { 1: 0.5, 2: 3, 3: 10 };
function nextIntervalMs(score, reviewCount) {
  if (score === 0) return Infinity;
  const base = BASE_INTERVALS[score] || 1;
  return base * Math.pow(1.8, Math.max(0, reviewCount - 1)) * 86400000;
}
function getTodayStr() { return new Date().toISOString().slice(0,10); }

function buildTodayQueue() {
  const now = Date.now();
  const due = [], newCards = [];
  const source = filteredCards();
  source.forEach(c => {
    const score = state.scores[c.id];
    if (score === 0) return; // permanently skipped
    const last = state.lastReview[c.id];
    if (!last) { newCards.push(c.id); return; }
    const revCount = state.reviewCount[c.id] || 0;
    if (now >= last + nextIntervalMs(score, revCount)) due.push(c.id);
  });
  function shuffle(a) {
    for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  const newToday = Math.max(0, state.daily - due.length);
  return [...shuffle(due), ...shuffle(newCards).slice(0, newToday)];
}

function getDueCount() {
  const now = Date.now();
  return CARDS.filter(c => {
    const score = state.scores[c.id];
    if (!score || score===0) return false;
    const last = state.lastReview[c.id];
    if (!last) return false;
    return now >= last + nextIntervalMs(score, state.reviewCount[c.id]||0);
  }).length;
}

// ===== STUDY =====
let queue = [];
let qIdx = 0;
let currentId = null;
let pendingScore = null;

const PART_EMOJI = {
  '校园篇':'🎓','职场工作篇':'💼','恋爱结婚篇':'💕',
  '手机篇':'📱','网络篇':'💻','外形篇':'👗',
  '性格篇':'🧠','电视篇':'📺','兴趣篇':'🎮',
  '生活用语篇':'💬','番外篇':'🔤'
};

function initStudy() {
  renderStudyCatFilter();
  queue = buildTodayQueue();
  qIdx = 0;
  showCard();
}

function showCard() {
  // clear done overlay
  const ov = document.getElementById('done-overlay');
  if (ov) ov.remove();
  document.getElementById('score-row').style.display = '';

  if (qIdx >= queue.length) { showDone(); return; }

  currentId = queue[qIdx];
  const card = CARDS.find(c => c.id === currentId);
  if (!card) { qIdx++; showCard(); return; }

  pendingScore = null;
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));

  // fill DOM
  document.getElementById('card-part').textContent = card.part;
  document.getElementById('card-num').textContent = `${qIdx+1} / ${queue.length}`;
  document.getElementById('card-word').textContent = card.word;
  document.getElementById('card-reading').textContent = card.reading;
  document.getElementById('card-meaning').textContent = card.meaning;
  document.getElementById('card-ex-jp').textContent = card.example_jp;

  updateProgress();

  const el = document.getElementById('the-card');
  el.classList.remove('card-enter');
  void el.offsetWidth;
  el.classList.add('card-enter');
}

function showDone() {
  document.getElementById('score-row').style.display = 'none';
  updateProgress();
  const cc = document.getElementById('card-container');
  let ov = document.createElement('div');
  ov.id = 'done-overlay';
  const s0=Object.values(state.scores).filter(s=>s===0).length;
  const s1=Object.values(state.scores).filter(s=>s===1).length;
  const s2=Object.values(state.scores).filter(s=>s===2).length;
  const s3=Object.values(state.scores).filter(s=>s===3).length;
  // check if there are unseen cards left
  const unseenLeft = CARDS.filter(c => !state.lastReview[c.id] && state.scores[c.id] !== 0).length;
  const moreBtn = unseenLeft > 0
    ? `<button class="more-btn" id="more-group-btn">＋ 再学一组（10个）</button>`
    : `<div class="done-note-sub">所有词汇已学完 🎊</div>`;
  ov.innerHTML = `
    <span class="done-emoji">✨</span>
    <div class="done-title">今日完了！</div>
    <div class="done-sub">学习了 ${state.todayDone} 张卡片</div>
    <div class="done-stats">
      <div class="done-stat" style="background:#1e1e24;border-color:var(--border)">
        <div class="dv" style="color:var(--text3)">${s0}</div><div class="dl">跳过</div>
      </div>
      <div class="done-stat" style="background:#0d1f35;border-color:#1e3a5f">
        <div class="dv" style="color:var(--blue)">${s1}</div><div class="dl">好难</div>
      </div>
      <div class="done-stat" style="background:#1a1800;border-color:#3a3200">
        <div class="dv" style="color:var(--gold)">${s2}</div><div class="dl">还好</div>
      </div>
      <div class="done-stat" style="background:#200e0e;border-color:#3d1a1a">
        <div class="dv" style="color:var(--green)">${s3}</div><div class="dl">很熟</div>
      </div>
    </div>
    ${moreBtn}
    <div class="done-note">明日また復習しよう 🌙</div>`;
  cc.appendChild(ov);
  if (unseenLeft > 0) {
    document.getElementById('more-group-btn').addEventListener('click', learnMoreGroup);
  }
}

function learnMoreGroup() {
  // pick next 10 unseen cards and append to queue
  const unseenIds = CARDS
    .filter(c => !state.lastReview[c.id] && state.scores[c.id] !== 0)
    .map(c => c.id)
    .slice(0, 10);
  if (unseenIds.length === 0) { showToast('没有更多新词了'); return; }
  queue = [...queue, ...unseenIds];
  // remove done overlay and resume
  const ov = document.getElementById('done-overlay');
  if (ov) ov.remove();
  document.getElementById('score-row').style.display = '';
  showCard();
}

function updateProgress() {
  const total = queue.length;
  const pct = total ? (qIdx / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-num').textContent = total ? `${qIdx} / ${total}` : '—';
}

function applyScore(score) {
  if (!currentId) return;
  pendingScore = score;
  document.querySelectorAll('.score-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.score) === score));
  setTimeout(advance, 300);
}

function advance() {
  if (pendingScore === null || !currentId) return;
  state.scores[currentId] = pendingScore;
  state.lastReview[currentId] = Date.now();
  state.reviewCount[currentId] = (state.reviewCount[currentId] || 0) + 1;
  state.todayDone++;
  qIdx++;
  saveState();
  showCard();
}

document.querySelectorAll('.score-btn').forEach(btn =>
  btn.addEventListener('click', () => applyScore(parseInt(btn.dataset.score))));

// Swipe
let tx=0, ty=0;
document.getElementById('card-container').addEventListener('touchstart', e => {
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
}, {passive:true});
document.getElementById('card-container').addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5 && pendingScore!==null) advance();
}, {passive:true});

// ===== TTS =====
let jaVoice = null;
if (window.speechSynthesis) {
  const loadV = () => { jaVoice = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'))||null; };
  loadV(); speechSynthesis.onvoiceschanged = loadV;
}
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.85;
  if (jaVoice) u.voice=jaVoice;
  speechSynthesis.speak(u);
}
document.getElementById('tts-word').addEventListener('click', () => {
  const c=CARDS.find(x=>x.id===currentId); if(c) speak(c.word);
});
document.getElementById('tts-example').addEventListener('click', () => {
  const c=CARDS.find(x=>x.id===currentId); if(c) speak(c.example_jp);
});

// ===== SETTINGS =====
function updateSettingsInfo() {
  const n = parseInt(document.getElementById('daily-slider').value);
  document.getElementById('daily-val').textContent = n;
  const unseenCount = CARDS.filter(c=>!state.lastReview[c.id]).length;
  const days = unseenCount > 0 ? Math.ceil(unseenCount/n) : 0;
  const seen = CARDS.length - unseenCount;
  document.getElementById('settings-info').textContent =
    days > 0 ? `每天学 ${n} 个新词，还需约 ${days} 天学完剩余词汇` : `已学完全部 ${CARDS.length} 词！`;
}
document.getElementById('daily-slider').addEventListener('input', updateSettingsInfo);
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('daily-slider').value = state.daily;
  updateSettingsInfo();
  document.getElementById('settings-overlay').classList.remove('hidden');
});
document.getElementById('settings-close').addEventListener('click', () => {
  state.daily = parseInt(document.getElementById('daily-slider').value);
  saveState();
  document.getElementById('settings-overlay').classList.add('hidden');
  initStudy(); // rebuild queue with new daily count
});
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').classList.add('hidden');
});
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('确定要重置全部学习进度？此操作不可撤销。')) {
    state = { scores:{}, lastReview:{}, reviewCount:{}, daily:state.daily, todayDone:0 };
    saveState();
    document.getElementById('settings-overlay').classList.add('hidden');
    initStudy();
    showToast('已重置');
  }
});

// ===== NAV =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));
  if (id==='plan-screen') renderPlan();
  if (id==='browse-screen') renderBrowse();
}
document.querySelectorAll('.bnav-btn').forEach(btn=>
  btn.addEventListener('click', ()=>showScreen(btn.dataset.screen)));

// ===== TOAST =====
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ===== PLAN =====
function renderPlan() {
  const seen = Object.keys(state.lastReview).length;
  document.getElementById('stat-total').textContent = CARDS.length;
  document.getElementById('stat-seen').textContent = seen;
  document.getElementById('stat-due').textContent = getDueCount();
  document.getElementById('stat-new').textContent = Math.min(
    CARDS.filter(c=>!state.lastReview[c.id]).length, state.daily);

  const dist=[0,1,2,3].map(s=>Object.values(state.scores).filter(v=>v===s).length);
  const colors=['var(--text3)','var(--blue)','var(--gold)','var(--green)'];
  const bgs=['#1e1e24','#0d1f35','#1a1800','#1a2a1a'];
  const borders=['var(--border)','#1e3a5f','#3a3200','#1a3a1a'];
  const labs=['跳过','好难','还好','很熟'];
  document.getElementById('score-dist').innerHTML = dist.map((cnt,i)=>`
    <div class="score-dist-item" style="background:${bgs[i]};border:1px solid ${borders[i]}">
      <div class="dc" style="color:${colors[i]}">${cnt}</div>
      <div class="dl">${labs[i]}</div>
    </div>`).join('');

  const parts=[...new Set(CARDS.map(c=>c.part))];
  document.getElementById('part-list').innerHTML = parts.map(p=>{
    const total=CARDS.filter(c=>c.part===p).length;
    const done=CARDS.filter(c=>c.part===p&&state.lastReview[c.id]).length;
    const pct=Math.round(done/total*100);
    return `<div class="part-item">
      <div class="part-name">${p}</div>
      <div class="part-bar-bg"><div class="part-bar-fill" style="width:${pct}%"></div></div>
      <div class="part-pct">${pct}%</div>
    </div>`;
  }).join('');
}

// ===== BROWSE =====
let browseFilter='全部';
function renderBrowse() {
  const parts=['全部',...new Set(CARDS.map(c=>c.cat))].filter(Boolean);
  document.getElementById('browse-filters').innerHTML=parts.map(p=>
    `<button class="filter-chip ${p===browseFilter?'active':''}" data-part="${p}">${p}</button>`
  ).join('');
  const catFiltered=activeCat==='全部'?CARDS:CARDS.filter(c=>c.cat===activeCat);
  const filtered=browseFilter==='全部'?catFiltered:catFiltered.filter(c=>c.cat===browseFilter);
  document.getElementById('word-list').innerHTML=filtered.map(card=>{
    const seen=state.lastReview[card.id];
    const score=state.scores[card.id];
    const badge=seen?(score===0?'—':score??'?'):'新';
    const bc=seen?`badge-${score??'new'}`:'badge-new';
    return `<div class="word-item" data-id="${card.id}">
      <div class="wi">${card.word}</div>
      <div class="winfo"><div class="wm">${card.meaning}</div><div class="wr">${card.reading}</div></div>
      <div class="word-badge ${bc}">${badge}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.filter-chip').forEach(b=>
    b.addEventListener('click',()=>{browseFilter=b.dataset.part;renderBrowse();}));
  document.querySelectorAll('.word-item').forEach(item=>
    item.addEventListener('click',()=>openModal(parseInt(item.dataset.id))));
}

// ===== MODAL =====
let modalCardId = null;
function openModal(id) {
  const card=CARDS.find(c=>c.id===id); if(!card) return;
  modalCardId=id;
  document.getElementById('modal-word').textContent=card.word;
  document.getElementById('modal-reading').textContent=card.reading;
  document.getElementById('modal-meaning').textContent=card.meaning;
  document.getElementById('modal-exp').textContent=card.explanation;
  document.getElementById('modal-ex-jp').textContent=card.example_jp;
  const cur=state.scores[id];
  document.querySelectorAll('.modal-score-btn').forEach(b=>
    b.classList.toggle('active',parseInt(b.dataset.score)===cur));
  document.getElementById('modal-overlay').classList.remove('hidden');
}
document.getElementById('modal-close').addEventListener('click',()=>
  document.getElementById('modal-overlay').classList.add('hidden'));
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
});
document.querySelectorAll('.modal-score-btn').forEach(btn=>btn.addEventListener('click',()=>{
  if(!modalCardId) return;
  const score=parseInt(btn.dataset.score);
  state.scores[modalCardId]=score;
  if(!state.lastReview[modalCardId]) state.lastReview[modalCardId]=Date.now();
  state.reviewCount[modalCardId]=state.reviewCount[modalCardId]||0;
  saveState();
  document.querySelectorAll('.modal-score-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showToast('已标记');
  renderBrowse();
}));

// ===== INIT =====
initStudy();
